<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    @page {
      size: A4;
      margin: 18mm 16mm 18mm 16mm;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.4;
      color: #111;
    }

    h1, h2, h3, h4 {
      color: #111;
      margin-top: 1.1em;
      margin-bottom: 0.35em;
    }

    h1 {
      font-size: 20pt;
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.2em;
    }

    h2 {
      font-size: 15pt;
    }

    h3 {
      font-size: 12.5pt;
    }

    p, ul, ol {
      margin-top: 0.35em;
      margin-bottom: 0.55em;
    }

    ul, ol {
      padding-left: 1.25em;
    }

    li {
      margin: 0.15em 0;
    }

    code {
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.92em;
      background: #f4f4f4;
      padding: 0.08em 0.28em;
      border-radius: 3px;
    }

    pre {
      background: #f4f4f4;
      padding: 0.7em;
      border-radius: 4px;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
    }

    pre code {
      background: transparent;
      padding: 0;
    }
  </style>
</head>
<body>
  {% for article in articles %}
  <article>
    {% if not article.has_custom_headline %}
    <h1>{{ article.title }}</h1>
    {% endif %}
    {{ article.content }}
  </article>
  {% endfor %}
</body>
</html>
